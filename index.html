<!DOCTYPE html>
<html>
<head>
  <title>Image Enhancement</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(135deg, #1e1e2f, #2b2b45);
      color: white;
      text-align: center;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: #2f2f4f;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    input[type="file"] {
      margin-bottom: 15px;
      color: white;
    }

    img {
      max-width: 250px;
      margin: 10px;
      border-radius: 10px;
      border: 2px solid #555;
    }

    .hidden {
      display: none;
    }

    .slider-group {
      margin: 15px 0;
      text-align: left;
    }

    input[type="range"] {
      width: 100%;
    }

    button {
      background: #4CAF50;
      border: none;
      padding: 10px 15px;
      margin: 5px;
      border-radius: 8px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #66ff99;
      color: black;
    }

    .filter-buttons button {
      background: #2196F3;
    }

    .filter-buttons button:hover {
      background: #64b5f6;
    }

    #result-ui {
      margin-top: 20px;
    }

    canvas {
      max-width: 100%;
      border-radius: 10px;
      border: 2px solid #555;
    }

  </style>
</head>

<body>

<div class="container">

<h1>✨ Image Enhancement Tool</h1>

<input type="file" id="upload">

<div id="empty-state">📷 ยังไม่มีรูป</div>

<div>
  <img id="before-img">
  <img id="main-img" class="hidden">
</div>

<div id="editor-ui">

  <div class="slider-group">
    Brightness: <span id="v-bright">100%</span>
    <input type="range" id="bright" min="0" max="200" value="100">
  </div>

  <div class="slider-group">
    Contrast: <span id="v-contrast">100%</span>
    <input type="range" id="contrast" min="0" max="200" value="100">
  </div>

  <div class="slider-group">
    Smooth: <span id="v-smooth">0px</span>
    <input type="range" id="smooth" min="0" max="10" value="0">
  </div>

  <div class="slider-group">
    Sharp: <span id="v-sharp">0%</span>
    <input type="range" id="sharp" min="0" max="100" value="0">
  </div>

  <div class="filter-buttons">
    <button onclick="setFilter('mean')">Mean</button>
    <button onclick="setFilter('median')">Median</button>
    <button onclick="setFilter('gaussian')">Gaussian</button>
    <button onclick="setFilter('wiener')">Wiener</button>
  </div>

  <button onclick="resetAll()">Reset</button>
  <button onclick="showFinal()">Show Final</button>

</div>

<div id="result-ui" class="hidden">
  <canvas id="after-canvas"></canvas><br>
  <button onclick="downloadImage()">Download</button>
  <button onclick="goBack()">Back</button>
</div>

</div>

<!-- ❗ JS ของคุณ (ไม่แก้แม้แต่นิดเดียว) -->
<script>
document.addEventListener("DOMContentLoaded", function () {

const upload = document.getElementById('upload');
const mainImg = document.getElementById('main-img');
const emptyState = document.getElementById('empty-state');
const brightness = document.getElementById('bright');
const contrast = document.getElementById('contrast');
const smooth = document.getElementById('smooth');
const sharp = document.getElementById('sharp');

let currentFilter = 'none';
let originalSrc = '';
let fileExtension = 'image/png';

upload.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        fileExtension = file.type;
        const reader = new FileReader();
        reader.onload = function(event) {
            originalSrc = event.target.result;
            mainImg.src = originalSrc;
            document.getElementById('before-img').src = originalSrc;
            mainImg.classList.remove('hidden');
            emptyState.classList.add('hidden');
            resetAll();
        }
        reader.readAsDataURL(file);
    }
});

function updateStyles() {
    const sh = sharp.value / 20;

    let filterStr = `
        brightness(${brightness.value}%)
        contrast(${contrast.value}%)
        blur(${smooth.value}px)
        grayscale(${sh * 10}%)
        contrast(${100 + parseInt(sharp.value)}%)
    `;

    if(currentFilter === 'mean') filterStr += ' opacity(0.9) blur(0.5px)';
    if(currentFilter === 'median') filterStr += ' saturate(0.8) contrast(1.1)';
    if(currentFilter === 'gaussian') filterStr += ' blur(1px)';
    if(currentFilter === 'wiener') filterStr += ' contrast(1.2) brightness(1.1) saturate(0)';

    mainImg.style.filter = filterStr;

    document.getElementById('v-bright').innerText = brightness.value + '%';
    document.getElementById('v-contrast').innerText = contrast.value + '%';
    document.getElementById('v-smooth').innerText = smooth.value + 'px';
    document.getElementById('v-sharp').innerText = sharp.value + '%';
}

brightness.addEventListener('input', updateStyles);
contrast.addEventListener('input', updateStyles);
smooth.addEventListener('input', updateStyles);
sharp.addEventListener('input', updateStyles);

window.setFilter = function(f) {
    currentFilter = f;
    updateStyles();
}

window.resetAll = function() {
    brightness.value = 100;
    contrast.value = 100;
    smooth.value = 0;
    sharp.value = 0;
    currentFilter = 'none';
    updateStyles();
}

window.showFinal = function() {
    document.getElementById('editor-ui').classList.add('hidden');
    document.getElementById('result-ui').classList.remove('hidden');

    const canvas = document.getElementById('after-canvas');
    const ctx = canvas.getContext('2d');

    const img = new Image();
    img.src = mainImg.src;

    img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.filter = mainImg.style.filter;
        ctx.drawImage(img, 0, 0);
    }
}

window.goBack = function() {
    document.getElementById('editor-ui').classList.remove('hidden');
    document.getElementById('result-ui').classList.add('hidden');
}

window.downloadImage = function() {
    const canvas = document.getElementById('after-canvas');
    const link = document.createElement('a');
    link.download = 'enhanced.png';
    link.href = canvas.toDataURL(fileExtension);
    link.click();
}

});
</script>

</body>
</html>
