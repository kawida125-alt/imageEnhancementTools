<script>
const upload = document.getElementById('upload');
const mainImg = document.getElementById('main-img');
const emptyState = document.getElementById('empty-state');
const brightness = document.getElementById('bright');
const contrast = document.getElementById('contrast');
const smooth = document.getElementById('smooth');
const sharp = document.getElementById('sharp');

let currentFilter = 'none';
let originalSrc = '';
let fileExtension = 'image/png';

// ✅ Upload
upload.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        fileExtension = file.type;
        const reader = new FileReader();
        reader.onload = function(event) {
            originalSrc = event.target.result;
            mainImg.src = originalSrc;
            document.getElementById('before-img').src = originalSrc;
            mainImg.classList.remove('hidden');
            emptyState.classList.add('hidden');
            resetAll();
        }
        reader.readAsDataURL(file);
    }
});

// ✅ Update filter
function updateStyles() {
    const sh = sharp.value / 20;

    let filterStr = `
        brightness(${brightness.value}%)
        contrast(${contrast.value}%)
        blur(${smooth.value}px)
        grayscale(${sh * 10}%)
        contrast(${100 + parseInt(sharp.value)}%)
    `;

    if(currentFilter === 'mean') filterStr += ' opacity(0.9) blur(0.5px)';
    if(currentFilter === 'median') filterStr += ' saturate(0.8) contrast(1.1)';
    if(currentFilter === 'gaussian') filterStr += ' blur(1px)';
    if(currentFilter === 'wiener') filterStr += ' contrast(1.2) brightness(1.1) saturate(0)';

    mainImg.style.filter = filterStr;

    // ✅ FIX จุดที่พัง
    document.getElementById('v-bright').innerText = brightness.value + '%';
    document.getElementById('v-contrast').innerText = contrast.value + '%';
    document.getElementById('v-smooth').innerText = smooth.value + 'px';
    document.getElementById('v-sharp').innerText = sharp.value + '%';
}

// ✅ Event slider (ของเดิมคุณไม่มี)
brightness.addEventListener('input', updateStyles);
contrast.addEventListener('input', updateStyles);
smooth.addEventListener('input', updateStyles);
sharp.addEventListener('input', updateStyles);

// ✅ Filters
function setFilter(f) {
    currentFilter = f;
    updateStyles();
}

// ✅ Reset
function resetAll() {
    brightness.value = 100;
    contrast.value = 100;
    smooth.value = 0;
    sharp.value = 0;
    currentFilter = 'none';
    updateStyles();
}

// ✅ Toggle info
function toggleInfo() {
    document.getElementById('info-box').classList.toggle('hidden');
}

// ✅ ไปหน้าผลลัพธ์
function showFinal() {
    document.getElementById('editor-ui').classList.add('hidden');
    document.getElementById('result-ui').classList.remove('hidden');

    const canvas = document.getElementById('after-canvas');
    const ctx = canvas.getContext('2d');

    const img = new Image();
    img.src = mainImg.src;

    img.onload = function() {
        canvas.width = img.width;
        canvas.height = img.height;

        ctx.filter = mainImg.style.filter;
        ctx.drawImage(img, 0, 0);
    }
}

// ✅ กลับ
function goBack() {
    document.getElementById('editor-ui').classList.remove('hidden');
    document.getElementById('result-ui').classList.add('hidden');
}

// ✅ ดาวน์โหลด
function downloadImage() {
    const canvas = document.getElementById('after-canvas');
    const link = document.createElement('a');
    link.download = 'enhanced.png';
    link.href = canvas.toDataURL(fileExtension);
    link.click();
}
</script>
