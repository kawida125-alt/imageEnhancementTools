<!DOCTYPE html>
<html>
<head>
  <title>Image Enhancement Pro</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    h1 {
      text-align: center;
      margin: 20px 0;
      font-size: 32px;
      letter-spacing: 1px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }

    .upload-box {
      text-align: center;
      border: 2px dashed rgba(255,255,255,0.3);
      padding: 30px;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .upload-box:hover {
      background: rgba(255,255,255,0.1);
    }

    input[type="file"] {
      display: none;
    }

    img {
      max-width: 100%;
      border-radius: 12px;
      margin-top: 10px;
    }

    .image-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      text-align: center;
    }

    .slider-group {
      margin: 15px 0;
    }

    .slider-group label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    input[type="range"] {
      width: 100%;
    }

    button {
      border: none;
      padding: 10px 15px;
      margin: 5px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-main {
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
    }

    .btn-main:hover {
      transform: scale(1.05);
    }

    .btn-filter {
      background: rgba(255,255,255,0.1);
      color: white;
    }

    .btn-filter:hover {
      background: rgba(255,255,255,0.3);
    }

    .hidden {
      display: none;
    }

    canvas {
      width: 100%;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<h1>✨ Image Enhancement Pro</h1>

<div class="container">

  <!-- Upload -->
  <div class="card">
    <label class="upload-box">
      📁 Click to Upload Image
      <input type="file" id="upload">
    </label>
    <div id="empty-state">No image uploaded</div>
  </div>

  <!-- Images -->
  <div class="card image-grid">
    <div>
      <h3>Before</h3>
      <img id="before-img">
    </div>
    <div>
      <h3>After</h3>
      <img id="main-img" class="hidden">
    </div>
  </div>

  <!-- Controls -->
  <div id="editor-ui" class="card">

    <div class="slider-group">
      <label>Brightness <span id="v-bright">100%</span></label>
      <input type="range" id="bright" min="0" max="200" value="100">
    </div>

    <div class="slider-group">
      <label>Contrast <span id="v-contrast">100%</span></label>
      <input type="range" id="contrast" min="0" max="200" value="100">
    </div>

    <div class="slider-group">
      <label>Smooth <span id="v-smooth">0px</span></label>
      <input type="range" id="smooth" min="0" max="10" value="0">
    </div>

    <div class="slider-group">
      <label>Sharp <span id="v-sharp">0%</span></label>
      <input type="range" id="sharp" min="0" max="100" value="0">
    </div>

    <div>
      <button class="btn-filter" onclick="setFilter('mean')">Mean</button>
      <button class="btn-filter" onclick="setFilter('median')">Median</button>
      <button class="btn-filter" onclick="setFilter('gaussian')">Gaussian</button>
      <button class="btn-filter" onclick="setFilter('wiener')">Wiener</button>
    </div>

    <div>
      <button class="btn-main" onclick="resetAll()">Reset</button>
      <button class="btn-main" onclick="showFinal()">Generate</button>
    </div>

  </div>

  <!-- Result -->
  <div id="result-ui" class="card hidden">
    <canvas id="after-canvas"></canvas><br><br>
    <button class="btn-main" onclick="downloadImage()">Download</button>
    <button class="btn-main" onclick="goBack()">Back</button>
  </div>

</div>

</script>

</body>
</html>
